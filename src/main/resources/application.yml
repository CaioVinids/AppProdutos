spring:
  application:
    name: jp-java-capacitacao-2026

  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    show-sql: true
    hibernate:
      ddl-auto: update

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PWD}
    driver-class-name: oracle.jdbc.OracleDriver

  server:
    port: ${PORT:8080}